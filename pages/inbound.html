<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Nhận hàng | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
WMS_UTILS.initAppShell('inbound.html', 'Nhận hàng', 'Tạo phiếu nhận, xác nhận và gửi IQC');
WMS_UTILS.pageRoot().innerHTML = `
  <div class="grid two">
    <section class="panel">
      <div class="panel-head"><h2>Tạo phiếu nhận</h2></div>
      <div class="panel-body">
        <form id="createForm" class="form-grid">
          <div class="field"><label>PO No</label><input name="PONo" required></div>
          <div class="field"><label>SupplierCode</label><input name="SupplierCode" required></div>
          <div class="field"><label>ReceiveDate</label><input name="ReceiveDate" type="date"></div>
          <div class="field"><label>MaterialCode</label><input name="MaterialCode" required></div>
          <div class="field"><label>QtyOrdered</label><input name="QtyOrdered" type="number" step="0.001" value="0"></div>
          <div class="field"><label>QtyReceived</label><input name="QtyReceived" type="number" step="0.001" required></div>
          <div class="field"><label>UoM</label><input name="UoM"></div>
          <div class="field"><label>LotNo</label><input name="LotNo" required></div>
          <div class="field"><label>MFGDate</label><input name="MFGDate" type="date"></div>
          <div class="field"><label>EXPDate</label><input name="EXPDate" type="date"></div>
          <div class="field full actions"><button class="btn primary">Tạo phiếu DRAFT</button></div>
        </form>
      </div>
    </section>
    <section class="panel">
      <div class="panel-head"><h2>Xử lý phiếu</h2></div>
      <div class="panel-body">
        <form id="actionForm" class="form-grid">
          <div class="field full"><label>IBNo</label><input name="IBNo" required></div>
          <div class="field full actions">
            <button class="btn blue" data-action="confirmInbound">Xác nhận nhận hàng</button>
            <button class="btn primary" data-action="submitToIQC">Gửi IQC</button>
            <button class="btn danger" data-action="voidInbound">Hủy phiếu</button>
          </div>
        </form>
      </div>
    </section>
  </div>
  <section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Phiếu nhận gần đây</h2><button class="btn" id="reloadBtn">Tải lại</button></div><div class="panel-body table-wrap"><table><thead><tr><th>IBNo</th><th>PO</th><th>NCC</th><th>Status</th><th>CreatedBy</th></tr></thead><tbody id="rows"></tbody></table></div></section>`;

async function load() {
  WMS_UTILS.loadTable('listInbounds', { status: 'ALL', limit: 50 }, document.getElementById('rows'), r =>
    `<tr><td>${WMS_UTILS.escapeHtml(r.ibNo)}</td><td>${WMS_UTILS.escapeHtml(r.poNo)}</td><td>${WMS_UTILS.escapeHtml(r.supplierCode)}</td><td>${WMS_UTILS.badge(r.status)}</td><td>${WMS_UTILS.escapeHtml(r.createdBy)}</td></tr>`, 5);
}
document.getElementById('createForm').addEventListener('submit', e => {
  e.preventDefault();
  const d = WMS_UTILS.formData(e.currentTarget);
  WMS_UTILS.run(e.submitter, async () => {
    const res = await WMS_API.call('createInbound', { PONo:d.PONo, SupplierCode:d.SupplierCode, ReceiveDate:d.ReceiveDate, lines:[d] });
    WMS_UTILS.toast(`Đã tạo ${res.ibNo}`, 'ok');
    e.currentTarget.reset();
    load();
  });
});
document.getElementById('actionForm').addEventListener('submit', e => e.preventDefault());
document.getElementById('actionForm').addEventListener('click', e => {
  if (!e.target.dataset.action) return;
  const d = WMS_UTILS.formData(document.getElementById('actionForm'));
  const payload = e.target.dataset.action === 'voidInbound' ? { IBNo:d.IBNo, reason:'Void from PWA' } : { IBNo:d.IBNo };
  WMS_UTILS.run(e.target, async () => {
    await WMS_API.call(e.target.dataset.action, payload);
    WMS_UTILS.toast('Đã xử lý phiếu', 'ok');
    load();
  });
});
document.getElementById('reloadBtn').addEventListener('click', load);
load();
</script>
</body></html>

<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Nhận hàng | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
const U = WMS_UTILS;
U.initAppShell('inbound.html', 'Nhận hàng', 'Nhận NVL từ nhà cung cấp, có PO hoặc không PO');
U.pageRoot().innerHTML = `
<div class="grid two">
<section class="panel"><div class="panel-head"><h2>Tạo phiếu nhận</h2></div><div class="panel-body"><form id="createForm" class="form-grid"><div class="field"><label>Số PO (nếu có)</label><input name="poNo"></div><div class="field"><label>Mã nhà cung cấp</label><input name="supplierCode"></div><div class="field"><label>Category</label><input name="category"></div><div class="field"><label>Ngày nhận</label><input name="receiveDate" type="date"></div><div class="field full actions"><button class="btn primary">Tạo phiếu nháp</button></div></form></div></section>
<section class="panel"><div class="panel-head"><h2>Thêm dòng nhận</h2></div><div class="panel-body"><form id="lineForm" class="form-grid"><div class="field"><label>Số phiếu nhận</label><input name="ibNo" required></div><div class="field"><label>Mã vật tư</label><input name="materialCode" required></div><div class="field"><label>SL nhận</label><input name="qtyReceived" type="number" step="0.001" required></div><div class="field"><label>Đơn vị tính</label><input name="uom"></div><div class="field"><label>Số lot</label><input name="lotNo" required></div><div class="field"><label>Ngày SX</label><input name="mfgDate" type="date"></div><div class="field"><label>Hạn dùng</label><input name="expDate" type="date"></div><div class="field full actions"><button class="btn primary">Lưu dòng</button></div></form></div></section>
</div>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Xử lý phiếu</h2></div><div class="panel-body"><form id="actionForm" class="form-grid"><div class="field"><label>Số phiếu nhận</label><input name="ibNo" required></div><div class="field"><label>Lý do hủy</label><input name="reason"></div><div class="field full actions"><button class="btn blue" data-action="confirmInbound">Xác nhận nhận hàng</button><button class="btn primary" data-action="submitToIQC">Gửi IQC</button><button class="btn danger" data-action="voidInbound">Hủy phiếu</button><button class="btn" data-action="getInbound">Xem chi tiết</button></div></form><div id="detailBox" style="margin-top:14px"></div></div></section>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Phiếu nhận gần đây</h2><button class="btn primary" id="reloadBtn">Tải lại</button></div><div class="panel-body"><div class="toolbar"><div class="field"><label>Trạng thái</label><select id="statusFilter"><option>ALL</option><option>DRAFT</option><option>CONFIRMED</option><option>SENT_IQC</option><option>VOIDED</option></select></div><div class="field"><label>Tìm kiếm</label><input id="searchFilter"></div></div><div id="rows"></div></div></section>`;
createForm.addEventListener('submit', e => { e.preventDefault(); U.run(e.submitter, async () => { const res = await WMS_API.call('createInbound', U.formData(e.currentTarget)); U.toast('Đã tạo ' + res.ibNo, 'ok'); lineForm.ibNo.value = res.ibNo; actionForm.ibNo.value = res.ibNo; e.currentTarget.reset(); load(); }); });
lineForm.addEventListener('submit', e => { e.preventDefault(); U.run(e.submitter, async () => { await WMS_API.call('saveInboundLine', U.formData(e.currentTarget)); U.toast('Đã lưu dòng nhận', 'ok'); }); });
actionForm.addEventListener('submit', e => e.preventDefault());
actionForm.addEventListener('click', e => { if (!e.target.dataset.action) return; U.run(e.target, async () => { const d = U.formData(actionForm); if (e.target.dataset.action === 'getInbound') { const data = await WMS_API.call('getInbound', { ibNo: d.ibNo }); detailBox.innerHTML = U.jsonBlock(data); return; } await WMS_API.call(e.target.dataset.action, d); U.toast('Đã xử lý phiếu nhận', 'ok'); load(); }); });
async function load() {
  const data = await WMS_API.call('listInbounds', { status: statusFilter.value, search: searchFilter.value, limit: 100 });
  rows.innerHTML = U.table(['Số phiếu','PO','NCC','Category','Ngày nhận','Trạng thái','Người tạo'], (data.items || []).map(r => `<tr><td>${U.escapeHtml(r.ibNo)}</td><td>${U.escapeHtml(r.poNo)}</td><td>${U.escapeHtml(r.supplierCode)}</td><td>${U.escapeHtml(r.category)}</td><td>${U.escapeHtml(r.receiveDate)}</td><td>${U.badge(r.status)}</td><td>${U.escapeHtml(r.createdBy)}</td></tr>`), 'Chưa có phiếu nhận');
}
reloadBtn.addEventListener('click', () => U.run(reloadBtn, load));
load();
</script>
</body></html>

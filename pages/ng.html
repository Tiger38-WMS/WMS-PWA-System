<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Kho NG | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
const U = WMS_UTILS;
U.initAppShell('ng.html', 'Kho NG', 'Theo dõi hàng IQC không đạt và trạng thái xử lý');
U.pageRoot().innerHTML = `
<section class="panel"><div class="panel-head"><h2>Danh sách NG</h2><button class="btn primary" id="loadBtn">Tải danh sách</button></div><div class="panel-body"><div class="toolbar"><div class="field"><label>Trạng thái</label><select id="statusFilter"><option>ALL</option><option>OPEN</option><option>RETURN_VENDOR</option><option>SCRAP</option><option>CLOSED</option></select></div><div class="field"><label>Tìm kiếm</label><input id="searchFilter"></div></div><div id="rows"></div></div></section>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Cập nhật NG</h2></div><div class="panel-body"><form id="ngForm" class="form-grid"><div class="field"><label>Mã NG / Số phiếu IQC</label><input name="ngNo" required></div><div class="field"><label>Trạng thái mới</label><select name="status"><option>RETURN_VENDOR</option><option>INTERNAL_USE</option><option>SCRAP</option><option>CLOSED</option></select></div><div class="field"><label>Ghi chú</label><input name="note"></div><div class="field full actions"><button class="btn primary" data-action="updateNGStatus">Cập nhật</button><button class="btn blue" data-action="getNGDetail">Xem chi tiết</button><button class="btn danger" data-action="closeNG">Đóng NG</button></div></form><div id="detailBox" style="margin-top:14px"></div></div></section>`;
ngForm.addEventListener('submit', e => e.preventDefault());
ngForm.addEventListener('click', e => { if (!e.target.dataset.action) return; U.run(e.target, async () => { const d = U.formData(ngForm); if (e.target.dataset.action === 'getNGDetail') { const data = await WMS_API.call('getNGDetail', d); detailBox.innerHTML = U.jsonBlock(data); return; } await WMS_API.call(e.target.dataset.action, d); U.toast('Đã xử lý NG', 'ok'); load(); }); });
async function load() {
  const data = await WMS_API.call('listNG', { status: statusFilter.value, search: searchFilter.value, limit: 100 });
  rows.innerHTML = U.table(['Mã NG','IQC','Phiếu nhận','Vật tư','Lot','SL lỗi','Trạng thái','Ghi chú'], (data.items || []).map(r => `<tr><td>${U.escapeHtml(U.field(r,['ngNo','NGNo']))}</td><td>${U.escapeHtml(U.field(r,['iqcNo','IQCNo']))}</td><td>${U.escapeHtml(U.field(r,['ibNo','IBNo']))}</td><td>${U.escapeHtml(U.field(r,['materialCode','MaterialCode']))}</td><td>${U.escapeHtml(U.field(r,['lotNo','LotNo']))}</td><td>${U.money(U.field(r,['qtyFail','QtyFail']))}</td><td>${U.badge(U.field(r,['status','Status']))}</td><td>${U.escapeHtml(U.field(r,['remark','note','Remark']))}</td></tr>`), 'Chưa có dữ liệu NG');
}
loadBtn.addEventListener('click', () => U.run(loadBtn, load));
load();
</script>
</body></html>

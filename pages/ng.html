<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Kho NG | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
WMS_UTILS.initAppShell('ng.html', 'Kho NG', 'Tổng hợp dòng FAIL từ IQC');
WMS_UTILS.pageRoot().innerHTML = `<section class="panel"><div class="panel-head"><h2>Tra cứu NG theo IQC</h2></div><div class="panel-body"><form id="ngForm" class="form-grid"><div class="field"><label>IQCNo</label><input name="IQCNo" required></div><div class="field actions"><button class="btn primary">Tổng hợp NG</button></div></form></div></section><section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Dòng FAIL</h2></div><div class="panel-body table-wrap"><table><thead><tr><th>IQCNo</th><th>IBNo</th><th>Material</th><th>Lot</th><th>QtyFail</th><th>Remark</th></tr></thead><tbody id="rows"><tr><td colspan="6" class="empty">Nhập IQCNo để xem dữ liệu NG.</td></tr></tbody></table></div></section>`;
document.getElementById('ngForm').addEventListener('submit',e=>{ e.preventDefault(); const d=WMS_UTILS.formData(e.currentTarget); WMS_UTILS.run(e.submitter,async()=>{ const res=await WMS_API.call('routeToNG',d); const rows=res.failLines||[]; document.getElementById('rows').innerHTML=rows.length?rows.map(r=>`<tr><td>${WMS_UTILS.escapeHtml(r.iqcNo)}</td><td>${WMS_UTILS.escapeHtml(r.ibNo)}</td><td>${WMS_UTILS.escapeHtml(r.materialCode)}</td><td>${WMS_UTILS.escapeHtml(r.lotNo)}</td><td>${r.qtyFail}</td><td>${WMS_UTILS.escapeHtml(r.remark)}</td></tr>`).join(''):'<tr><td colspan="6" class="empty">Không có dòng FAIL.</td></tr>'; }); });
</script>
</body></html>

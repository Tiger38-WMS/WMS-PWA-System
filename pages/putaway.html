<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Nhập vị trí | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
const U = WMS_UTILS;
U.initAppShell('putaway.html', 'Nhập vị trí', 'Hai luồng IQC_PASS và ORDER_IN, chọn vị trí trước khi nhập kho');
U.pageRoot().innerHTML = `
<div class="grid two">
<section class="panel"><div class="panel-head"><h2>Cập nhật dòng nhập vị trí</h2></div><div class="panel-body"><form id="lineForm" class="form-grid"><div class="field"><label>Số phiếu nhập vị trí</label><input name="putawayNo" required></div><div class="field"><label>Mã vật tư</label><input name="materialCode" required></div><div class="field"><label>Số lot</label><input name="lotNo" required></div><div class="field"><label>Vị trí nhập</label><input name="toLocationCode" required></div><div class="field"><label>Số lượng</label><input name="qty" type="number" step="0.001"></div><div class="field full actions"><button class="btn primary">Lưu vị trí</button><button class="btn blue" type="button" id="suggestBtn">Gợi ý vị trí</button></div></form><div id="suggestions" class="muted"></div></div></section>
<section class="panel"><div class="panel-head"><h2>Thao tác phiếu</h2></div><div class="panel-body"><form id="actionForm" class="form-grid"><div class="field"><label>Số phiếu nhập vị trí</label><input name="putawayNo" required></div><div class="field full actions"><button class="btn primary" data-action="confirmPutaway">Xác nhận nhập kho</button><button class="btn danger" data-action="voidPutaway">Hủy phiếu</button><button class="btn" data-action="getPutaway">Xem chi tiết</button></div></form><div id="detailBox" style="margin-top:14px"></div></div></section>
</div>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Phiếu chờ nhập vị trí</h2><button class="btn primary" id="reloadBtn">Tải lại</button></div><div class="panel-body"><div class="toolbar"><div class="field"><label>Nguồn</label><select id="sourceType"><option>ALL</option><option>IQC_PASS</option><option>ORDER_IN</option></select></div><div class="field"><label>Tìm kiếm</label><input id="searchFilter"></div></div><div id="rows"></div></div></section>`;
lineForm.addEventListener('submit', e => { e.preventDefault(); U.run(e.submitter, async () => { await WMS_API.call('savePutawayLine', U.formData(e.currentTarget)); U.toast('Đã lưu vị trí', 'ok'); load(); }); });
suggestBtn.addEventListener('click', e => U.run(e.currentTarget, async () => { const d = U.formData(lineForm); const res = await WMS_API.call('suggestLocation', { materialCode: d.materialCode }); suggestions.innerHTML = U.table(['Vị trí','Kho','Trạng thái','Ưu tiên'], (res.suggestions || []).map(x => `<tr><td>${U.escapeHtml(x.locationCode)}</td><td>${U.escapeHtml(x.warehouseCode)}</td><td>${U.badge(x.status)}</td><td>${U.escapeHtml(x.priority)}</td></tr>`), res.note || 'Không có gợi ý'); }));
actionForm.addEventListener('submit', e => e.preventDefault());
actionForm.addEventListener('click', e => { if (!e.target.dataset.action) return; U.run(e.target, async () => { const d = U.formData(actionForm); if (e.target.dataset.action === 'getPutaway') { const data = await WMS_API.call('getPutaway', d); detailBox.innerHTML = U.jsonBlock(data); return; } await WMS_API.call(e.target.dataset.action, d); U.toast('Đã xử lý phiếu nhập vị trí', 'ok'); load(); }); });
async function load() {
  const data = await WMS_API.call('listPutawayPending', { sourceType: sourceType.value, search: searchFilter.value, limit: 100 });
  rows.innerHTML = U.table(['Số phiếu','Nguồn','Số nguồn','Ngày','Trạng thái','Dòng','Đã có vị trí','Người tạo'], (data.items || []).map(r => `<tr><td>${U.escapeHtml(r.putawayNo)}</td><td>${U.escapeHtml(r.sourceType)}</td><td>${U.escapeHtml(r.sourceNo)}</td><td>${U.escapeHtml(r.putawayDate)}</td><td>${U.badge(r.status)}</td><td>${U.escapeHtml(r.lineCount)}</td><td>${U.escapeHtml(r.readyCount)}</td><td>${U.escapeHtml(r.createdBy)}</td></tr>`), 'Không có phiếu chờ nhập vị trí');
}
reloadBtn.addEventListener('click', () => U.run(reloadBtn, load));
load();
</script>
</body></html>

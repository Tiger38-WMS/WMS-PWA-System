<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Tổng quan | Quản lý kho WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
const U = WMS_UTILS;
U.initAppShell('dashboard.html', 'Tổng quan', 'Tổng quan nhanh các luồng WMS v6');
U.pageRoot().innerHTML = `
<div class="grid four">
  <a class="panel metric" href="./po.html"><div class="label">PO đang mở</div><div class="value" id="poCount">-</div></a>
  <a class="panel metric" href="./iqc.html"><div class="label">IQC chờ kiểm</div><div class="value" id="iqcCount">-</div></a>
  <a class="panel metric" href="./request.html"><div class="label">Đơn chờ duyệt</div><div class="value" id="requestCount">-</div></a>
  <a class="panel metric" href="./outbound.html"><div class="label">Phiếu xuất chờ</div><div class="value" id="issueCount">-</div></a>
</div>
<div class="grid two" style="margin-top:14px">
<section class="panel"><div class="panel-head"><h2>Đồng bộ ngoại tuyến</h2><button class="btn primary" id="syncBtn">Đồng bộ ngay</button></div><div class="panel-body"><p class="muted" id="queueInfo">Đang kiểm tra hàng đợi...</p></div></section>
<section class="panel"><div class="panel-head"><h2>Điều hướng nhanh</h2></div><div class="panel-body"><div class="grid two"><a class="quick-card" href="./putaway.html"><span>Nhập vị trí</span><strong>IQC_PASS / ORDER_IN</strong></a><a class="quick-card" href="./stocktake.html"><span>Kiểm kê</span><strong>Snapshot / Recount</strong></a><a class="quick-card" href="./print.html"><span>In ấn</span><strong>TSC TX310</strong></a><a class="quick-card" href="../pda/approval.html"><span>PDA</span><strong>Duyệt đơn</strong></a></div></div></section>
</div>`;
async function refresh() {
  try {
    const [summary, queue] = await Promise.all([
      WMS_API.call('getDashboardSummary', {}, { cacheTtlMs: 30000 }).catch(() => null),
      WMS_DB.listQueue()
    ]);
    poCount.textContent = summary ? summary.poOpen || 0 : 0;
    iqcCount.textContent = summary ? summary.iqcPending || 0 : 0;
    requestCount.textContent = summary ? summary.requestPending || 0 : 0;
    issueCount.textContent = summary ? summary.issuePending || 0 : 0;
    queueInfo.textContent = queue.length ? `${queue.length} thao tác chưa đồng bộ.` : 'Không có thao tác ngoại tuyến đang chờ.';
  } catch (err) { U.toast(err.message, 'error'); }
}
syncBtn.addEventListener('click', event => U.run(event.currentTarget, async () => { const result = await WMS_API.syncQueue(); U.toast(`Đã đồng bộ ${result.synced} thao tác`, 'ok'); refresh(); }));
refresh();
</script>
</body></html>

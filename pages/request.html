<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Quản lý đơn | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
const U = WMS_UTILS;
const REQUEST_TYPES = ['退料单','半成品入库单','成品入库单','领料单','半成品领料单','成品出库单','报废单','送货单'];
U.initAppShell('request.html', 'Quản lý đơn', '9 loại đơn nhập/xuất, tự xác định IN/OUT và routing sau duyệt');
U.pageRoot().innerHTML = `
<div class="grid two">
<section class="panel"><div class="panel-head"><h2>Tạo đơn</h2></div><div class="panel-body"><form id="createForm" class="form-grid"><div class="field"><label>Loại đơn</label><select name="requestType">${REQUEST_TYPES.map(x=>`<option>${x}</option>`).join('')}</select></div><div class="field"><label>Bộ phận yêu cầu</label><input name="deptFrom" required placeholder="Kho"></div><div class="field"><label>Bộ phận nhận</label><input name="deptTo" required placeholder="VENDOR / Kho / Sản xuất"></div><div class="field full"><label>Ghi chú</label><input name="note"></div><div class="field full actions"><button class="btn primary">Tạo đơn nháp</button></div></form></div></section>
<section class="panel"><div class="panel-head"><h2>Thêm dòng đơn</h2></div><div class="panel-body"><form id="lineForm" class="form-grid"><div class="field"><label>Số đơn</label><input name="requestNo" required></div><div class="field"><label>Mã vật tư</label><input name="materialCode" required></div><div class="field"><label>SL yêu cầu</label><input name="qtyRequested" type="number" step="0.001" required></div><div class="field"><label>Đơn vị tính</label><input name="uom"></div><div class="field full actions"><button class="btn primary">Lưu dòng</button></div></form></div></section>
</div>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Duyệt / gửi đơn</h2></div><div class="panel-body"><form id="actionForm" class="form-grid"><div class="field"><label>Số đơn</label><input name="requestNo" required></div><div class="field"><label>Lý do từ chối / hủy</label><input name="reason"></div><div class="field full actions"><button class="btn blue" data-action="submitRequest">Gửi đơn</button><button class="btn primary" data-action="approveRequest">Duyệt</button><button class="btn warn" data-action="rejectRequest">Từ chối</button><button class="btn danger" data-action="cancelRequest">Hủy</button><button class="btn" data-action="getRequest">Xem chi tiết</button></div></form><div id="detailBox" style="margin-top:14px"></div></div></section>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Danh sách đơn</h2><button id="reloadBtn" class="btn primary">Tải lại</button></div><div class="panel-body"><div class="toolbar"><div class="field"><label>Trạng thái</label><select id="statusFilter"><option>ALL</option><option>DRAFT</option><option>PENDING_APPROVAL</option><option>APPROVED</option><option>COMPLETED</option><option>REJECTED</option><option>CANCELLED</option></select></div><div class="field"><label>Loại</label><input id="typeFilter"></div><div class="field"><label>Tìm kiếm</label><input id="searchFilter"></div></div><div id="rows"></div></div></section>`;
createForm.addEventListener('submit', e => { e.preventDefault(); U.run(e.submitter, async () => { const res = await WMS_API.call('createRequest', U.formData(e.currentTarget)); U.toast(`Đã tạo ${res.requestNo} (${res.category}${res.needApproval ? ', cần duyệt' : ', không cần duyệt'})`, 'ok'); lineForm.requestNo.value = res.requestNo; actionForm.requestNo.value = res.requestNo; e.currentTarget.reset(); load(); }); });
lineForm.addEventListener('submit', e => { e.preventDefault(); U.run(e.submitter, async () => { await WMS_API.call('saveRequestLine', U.formData(e.currentTarget)); U.toast('Đã lưu dòng đơn', 'ok'); }); });
actionForm.addEventListener('submit', e => e.preventDefault());
actionForm.addEventListener('click', e => { if (!e.target.dataset.action) return; U.run(e.target, async () => { const d = U.formData(actionForm); if (e.target.dataset.action === 'getRequest') { const data = await WMS_API.call('getRequest', { requestNo: d.requestNo }); detailBox.innerHTML = U.jsonBlock(data); return; } await WMS_API.call(e.target.dataset.action, d); U.toast('Đã xử lý đơn', 'ok'); load(); }); });
async function load() {
  const data = await WMS_API.call('listRequests', { status: statusFilter.value, requestType: typeFilter.value, search: searchFilter.value, limit: 100 });
  rows.innerHTML = U.table(['Số đơn','Loại','IN/OUT','Từ','Đến','Cần duyệt','Trạng thái','Người duyệt','Người tạo'], (data.items || []).map(r => `<tr><td>${U.escapeHtml(r.requestNo)}</td><td>${U.escapeHtml(r.requestType)}</td><td>${U.escapeHtml(r.category || r.requestCategory)}</td><td>${U.escapeHtml(r.deptFrom)}</td><td>${U.escapeHtml(r.deptTo)}</td><td>${U.escapeHtml(String(r.needApproval))}</td><td>${U.badge(r.status)}</td><td>${U.escapeHtml(r.approvedBy)}</td><td>${U.escapeHtml(r.createdBy)}</td></tr>`), 'Chưa có đơn');
}
reloadBtn.addEventListener('click', () => U.run(reloadBtn, load));
load();
</script>
</body></html>

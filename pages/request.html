<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Yêu cầu | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
WMS_UTILS.initAppShell('request.html', 'Quản lý đơn', 'Tạo yêu cầu và duyệt số lượng xuất');
WMS_UTILS.pageRoot().innerHTML = `
<div class="grid two">
<section class="panel"><div class="panel-head"><h2>Tạo đơn</h2></div><div class="panel-body"><form id="createForm" class="form-grid"><div class="field"><label>Loại đơn</label><select name="RequestType"><option value="NVL">Nguyên vật liệu</option><option value="TP">Thành phẩm</option><option value="RETURN">Hoàn trả</option><option value="SCRAP">Hủy phế</option></select></div><div class="field"><label>Mã bộ phận</label><input name="DeptCode" required></div><div class="field"><label>Mã vật tư</label><input name="MaterialCode" required></div><div class="field"><label>SL yêu cầu</label><input name="QtyRequested" type="number" step="0.001" required></div><div class="field full actions"><button class="btn primary">Tạo đơn nháp</button></div></form></div></section>
<section class="panel"><div class="panel-head"><h2>Duyệt / gửi đơn</h2></div><div class="panel-body"><form id="actionForm" class="form-grid"><div class="field"><label>Số đơn</label><input name="RequestNo" required></div><div class="field"><label>Mã dòng</label><input name="LineID"></div><div class="field"><label>SL duyệt</label><input name="QtyApproved" type="number" step="0.001"></div><div class="field full actions"><button class="btn blue" data-action="submitRequest">Gửi duyệt</button><button class="btn primary" data-action="approveRequest">Duyệt</button><button class="btn warn" data-action="rejectRequest">Từ chối</button><button class="btn danger" data-action="voidRequest">Hủy</button></div></form></div></section>
</div>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Danh sách đơn</h2><button id="reloadBtn" class="btn">Tải lại</button></div><div class="panel-body table-wrap"><table><thead><tr><th>Số đơn</th><th>Loại</th><th>Bộ phận</th><th>Trạng thái</th><th>Người duyệt</th><th>Người tạo</th></tr></thead><tbody id="rows"></tbody></table></div></section>`;
function load(){ WMS_UTILS.loadTable('listRequests',{status:'ALL',limit:50},document.getElementById('rows'),r=>`<tr><td>${WMS_UTILS.escapeHtml(r.requestNo)}</td><td>${WMS_UTILS.escapeHtml(r.requestType)}</td><td>${WMS_UTILS.escapeHtml(r.deptCode)}</td><td>${WMS_UTILS.badge(r.status)}</td><td>${WMS_UTILS.escapeHtml(r.approvedBy)}</td><td>${WMS_UTILS.escapeHtml(r.createdBy)}</td></tr>`,6); }
document.getElementById('createForm').addEventListener('submit',e=>{ e.preventDefault(); const d=WMS_UTILS.formData(e.currentTarget); WMS_UTILS.run(e.submitter,async()=>{ const res=await WMS_API.call('createRequest',{RequestType:d.RequestType,DeptCode:d.DeptCode,lines:[d]}); WMS_UTILS.toast(`Đã tạo ${res.requestNo}`,'ok'); e.currentTarget.reset(); load(); }); });
document.getElementById('actionForm').addEventListener('submit',e=>e.preventDefault());
document.getElementById('actionForm').addEventListener('click',e=>{ if(!e.target.dataset.action)return; const d=WMS_UTILS.formData(document.getElementById('actionForm')); let payload={RequestNo:d.RequestNo}; if(e.target.dataset.action==='approveRequest' && d.LineID){ payload.lines=[{LineID:d.LineID,QtyApproved:d.QtyApproved}]; } WMS_UTILS.run(e.target,async()=>{ await WMS_API.call(e.target.dataset.action,payload); WMS_UTILS.toast('Đã xử lý đơn','ok'); load(); }); });
document.getElementById('reloadBtn').addEventListener('click',load); load();
</script>
</body></html>

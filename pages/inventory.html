<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/app.css">
  <title>Tổng quan tồn kho | WMS</title>
</head>
<body>
<script src="../config.js"></script>
<script src="../js/db.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
const U = WMS_UTILS;
U.initAppShell('inventory.html', 'Tổng quan tồn kho', '');
document.body.classList.add('inventory-page');

const columns = [
  ['Ordinal', 'ordinal'],
  ['Category', 'category'],
  ['MaCode_MES', 'maCodeMES'],
  ['MaterialCode', 'materialCode'],
  ['ChineseName', 'chineseName'],
  ['VietnameseName', 'vietnameseName'],
  ['Vendor', 'vendor'],
  ['Spec', 'spec'],
  ['BeginningInventory', 'beginningInventory', 'num'],
  ['TotalInbound', 'totalInbound', 'num'],
  ['TotalOutbound', 'totalOutbound', 'num'],
  ['StockOnHand', 'stockOnHand', 'num'],
  ['UoM', 'uom'],
  ['Active', 'active', 'bool'],
  ['LastInboundDate', 'lastInboundDate'],
  ['LastOutboundDate', 'lastOutboundDate'],
  ['Note', 'note', 'note'],
  ['Source', 'source'],
];

U.pageRoot().innerHTML = `
<div class="tabs">
  <button class="tab-btn active" data-tab="overview" type="button">Tổng quan tồn kho</button>
  <button class="tab-btn" data-tab="material" type="button">Thêm vật tư</button>
</div>
<section class="panel">
  <div id="tab-overview">
  <div class="panel-head">
    <div class="actions">
      <button class="btn" id="recalcBtn" type="button">Tính lại tồn</button>
      <button class="btn primary" id="searchBtn" type="button">Tải bảng</button>
    </div>
  </div>
  <div class="panel-body">
    <form id="filterForm" class="form-grid inventory-filter">
      <div class="field"><label>Tìm mã / tên / nhà cung cấp</label><input name="search" autocomplete="off"></div>
      <div class="field"><label>Category</label><input name="category" autocomplete="off"></div>
      <div class="field"><label>Từ ngày</label><input name="dateFrom" type="date"></div>
      <div class="field"><label>Đến ngày</label><input name="dateTo" type="date"></div>
      <div class="field"><label>Trạng thái vật tư</label><select name="activeMode"><option value="active">Đang dùng</option><option value="all">Tất cả</option></select></div>
      <div class="field"><label>Cảnh báo tồn</label><select name="alertOnly"><option value="">Tất cả</option><option value="1">Chỉ thấp / hết tồn</option></select></div>
    </form>
    <div id="rows"></div>
  </div>
</div>
<div id="tab-material" class="hidden">
  <div class="panel-head">
    <h2>Thêm vật tư mới</h2>
  </div>
  <div class="panel-body">
    <form id="matForm" class="form-grid">
      <div class="field"><label>Category</label><input name="category" required></div>
      <div class="field"><label>Mã vật tư</label><input name="materialCode" required></div>
      <div class="field"><label>Tên tiếng Việt</label><input name="vietnameseName"></div>
      <div class="field"><label>Tên tiếng Trung</label><input name="chineseName"></div>
      <div class="field"><label>Nhà cung cấp</label><input name="vendor"></div>
      <div class="field"><label>Quy cách</label><input name="spec"></div>
      <div class="field"><label>Đơn vị tính</label><input name="uom"></div>
      <div class="field"><label>Tồn tối thiểu</label><input name="minQty" type="number"></div>
      <div class="field"><label>Tồn tối đa</label><input name="maxQty" type="number"></div>
      <div class="field"><label>Cần IQC</label><select name="needIQC"><option value="true">Có</option><option value="false">Không</option></select></div>
      <div class="field full actions"><button class="btn primary">Thêm vật tư</button></div>
    </form>
  </div>
</div>
</section>`;

document.querySelectorAll('.tab-btn').forEach(button => {
  button.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('[id^="tab-"]').forEach(item => item.classList.add('hidden'));
    button.classList.add('active');
    document.getElementById('tab-' + button.dataset.tab).classList.remove('hidden');
  });
});

function payloadFromFilters() {
  const data = U.formData(filterForm);
  return {
    search: data.search,
    category: data.category,
    dateFrom: data.dateFrom,
    dateTo: data.dateTo,
    activeOnly: data.activeMode !== 'all',
    alertOnly: data.alertOnly === '1',
    limit: 500,
  };
}

function renderCell(row, column) {
  const value = row[column[1]];
  if (column[2] === 'num') return `<td class="num">${U.money(value)}</td>`;
  if (column[2] === 'bool') return `<td>${value ? 'TRUE' : 'FALSE'}</td>`;
  if (column[2] === 'note') return `<td class="note-cell">${U.escapeHtml(value)}</td>`;
  return `<td>${U.escapeHtml(value)}</td>`;
}

function render(data) {
  const items = data.items || [];
  const headers = columns.map(([label]) => `<th>${U.escapeHtml(label)}</th>`).join('');
  const body = items.length
    ? items.map(row => `<tr>${columns.map(col => renderCell(row, col)).join('')}</tr>`).join('')
    : `<tr><td colspan="${columns.length}" class="empty">Chưa có dữ liệu tồn kho</td></tr>`;
  rows.innerHTML = `<div class="table-wrap"><table class="excel-table"><thead><tr>${headers}</tr></thead><tbody>${body}</tbody></table></div>`;
}

async function loadInventory() {
  rows.innerHTML = `<div class="empty">Đang tải dữ liệu tồn kho...</div>`;
  const data = await WMS_API.call('getOnHand', payloadFromFilters());
  render(data);
}

filterForm.addEventListener('submit', event => {
  event.preventDefault();
  U.run(searchBtn, loadInventory);
});
searchBtn.addEventListener('click', () => U.run(searchBtn, loadInventory));
recalcBtn.addEventListener('click', event => U.run(event.currentTarget, async () => {
  await WMS_API.call('recalcCache', {});
  U.toast('Đã tính lại tồn kho', 'ok');
  await loadInventory();
}));
matForm.addEventListener('submit', event => {
  event.preventDefault();
  U.run(event.submitter, async () => {
    const data = U.formData(event.currentTarget);
    data.needIQC = data.needIQC === 'true';
    await WMS_API.call('addNewMaterial', data);
    U.toast('Đã thêm vật tư', 'ok');
    event.currentTarget.reset();
    await loadInventory();
  });
});

loadInventory();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="../css/app.css"><title>Tồn kho | WMS</title></head>
<body>
<script src="../config.js"></script><script src="../js/db.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
WMS_UTILS.initAppShell('inventory.html', 'Tồn kho', 'Tra cứu tồn tổng và tồn theo lot');
WMS_UTILS.pageRoot().innerHTML = `
<section class="panel"><div class="panel-head"><h2>Bộ lọc</h2><button class="btn primary" id="searchBtn">Tìm kiếm</button></div><div class="panel-body"><form id="filterForm" class="form-grid"><div class="field"><label>MaterialCode</label><input name="MaterialCode"></div><div class="field"><label>LotNo</label><input name="LotNo"></div><div class="field"><label>LocationCode</label><input name="LocationCode"></div><div class="field"><label>Chế độ</label><select name="mode"><option value="lot">Theo lot</option><option value="onhand">Tổng hợp</option></select></div></form></div></section>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Kết quả</h2><button class="btn" id="recalcBtn">Recalc cache</button></div><div class="panel-body table-wrap"><table><thead id="thead"></thead><tbody id="rows"></tbody></table></div></section>
<section class="panel" style="margin-top:14px"><div class="panel-head"><h2>Chuyển vị trí</h2></div><div class="panel-body"><form id="moveForm" class="form-grid"><div class="field"><label>MaterialCode</label><input name="MaterialCode" required></div><div class="field"><label>LotNo</label><input name="LotNo" required></div><div class="field"><label>FromLocationCode</label><input name="FromLocationCode" required></div><div class="field"><label>ToLocationCode</label><input name="ToLocationCode" required></div><div class="field"><label>Qty</label><input name="Qty" type="number" step="0.001"></div><div class="field actions"><button class="btn warn">Chuyển vị trí</button></div></form></div></section>`;
async function search(){ const d=WMS_UTILS.formData(document.getElementById('filterForm')); const payload={MaterialCode:d.MaterialCode,LotNo:d.LotNo,LocationCode:d.LocationCode,limit:100}; const body=document.getElementById('rows'); if(d.mode==='onhand'){ document.getElementById('thead').innerHTML='<tr><th>Material</th><th>Location</th><th>TotalQty</th><th>Updated</th></tr>'; await WMS_UTILS.loadTable('getOnHand',payload,body,r=>`<tr><td>${WMS_UTILS.escapeHtml(r.materialCode)}</td><td>${WMS_UTILS.escapeHtml(r.locationCode)}</td><td>${r.totalQty}</td><td>${WMS_UTILS.escapeHtml(r.lastUpdated)}</td></tr>`,4); } else { document.getElementById('thead').innerHTML='<tr><th>Material</th><th>Lot</th><th>Location</th><th>Qty</th><th>Status</th></tr>'; await WMS_UTILS.loadTable('getLotBalance',payload,body,r=>`<tr><td>${WMS_UTILS.escapeHtml(r.materialCode)}</td><td>${WMS_UTILS.escapeHtml(r.lotNo)}</td><td>${WMS_UTILS.escapeHtml(r.locationCode)}</td><td>${r.qtyOnHand}</td><td>${WMS_UTILS.badge(r.status)}</td></tr>`,5); } }
document.getElementById('searchBtn').addEventListener('click',search);
document.getElementById('recalcBtn').addEventListener('click',e=>WMS_UTILS.run(e.currentTarget,async()=>{ await WMS_API.call('recalcCache',{}); WMS_UTILS.toast('Đã rebuild cache','ok'); search(); }));
document.getElementById('moveForm').addEventListener('submit',e=>{ e.preventDefault(); const d=WMS_UTILS.formData(e.currentTarget); WMS_UTILS.run(e.submitter,async()=>{ await WMS_API.call('moveLocation',d); WMS_UTILS.toast('Đã chuyển vị trí','ok'); search(); }); });
search();
</script>
</body></html>
